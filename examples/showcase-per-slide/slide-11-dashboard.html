<div class="db-chart"><div class="cb">

  <script>(()=>{const c=document.getElementById('cxfh0vt');if(!c)return;const ctx=c.getContext('2d');if(!ctx)return;const dpr=window.devicePixelRatio||1;const w=c.parentElement.clientWidth-20,h=300;c.width=w*dpr;c.height=h*dpr;c.style.width=w+'px';c.style.height=h+'px';ctx.scale(dpr,dpr);const data={labels:["NA","EU","APAC","LATAM"],datasets:[{"label":"Revenue","data":[520,340,280,110],"color":"#d4a853"}]};const pad={t:28,b:46,l:56,r:20},cw=w-pad.l-pad.r,ch=h-pad.t-pad.b;const maxV=Math.max(...data.datasets.flatMap(d=>d.data.map(v=>v)),1);const pal=['#d4a853','#f0c969','#d4a853','#e0556a','#5bb87a'];
  ctx.strokeStyle='#1a1a30';ctx.lineWidth=1;for(let i=0;i<=4;i++){const y=pad.t+ch*i/4;ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(w-pad.r,y);ctx.stroke();ctx.fillStyle='#a0998c';ctx.font='600 10px Inter,sans-serif';ctx.textAlign='right';ctx.fillText(Math.round(maxV*(1-i/4)),pad.l-6,y+4)}
  const gap=data.labels.length>1?cw/data.labels.length:80;const barW=Math.min(gap*0.5,44);const groupW=barW*data.datasets.length;const gg=(gap-groupW)/2;
  data.datasets.forEach((ds,di)=>{const col=ds.color||pal[di%pal.length];ds.data.forEach((v,vi)=>{const x=pad.l+vi*gap+gg+di*barW;const bh=Math.max((v/maxV)*ch,2);const y=pad.t+ch-bh;const grd=ctx.createLinearGradient(x,pad.t,x,pad.t+ch);grd.addColorStop(0,col);grd.addColorStop(1,col+'22');ctx.fillStyle=grd;ctx.beginPath();ctx.roundRect(x,y,barW-3,bh,[5,5,0,0]);ctx.fill();ctx.fillStyle='#eeebe5';ctx.font='600 11px Inter,sans-serif';ctx.textAlign='center';ctx.fillText(Math.round(v),x+(barW-3)/2,y-7)})});
  ctx.fillStyle='#eeebe5';ctx.font='600 11px Inter,sans-serif';ctx.textAlign='center';data.labels.forEach((l,vi)=>{ctx.fillText(String(l),pad.l+vi*gap+gap/2,h-12)});
  let lx=pad.l;ctx.textAlign='left';data.datasets.forEach((ds,di)=>{ctx.fillStyle=ds.color||pal[di%pal.length];ctx.beginPath();ctx.arc(lx+5,h-30,5,0,Math.PI*2);ctx.fill();ctx.fillStyle='#a0998c';ctx.font='600 10px Inter,sans-serif';ctx.fillText(ds.label,lx+14,h-24);lx+=ctx.measureText(ds.label).width+34})})()</script></div>
<div class="db-chart"><div class="cb"><div class="ctt">Customer Segments</div><canvas id="cdaqynb" style="width:100%;height:300px"></canvas></div><script>(()=>{const c=document.getElementById('cdaqynb');if(!c)return;const ctx=c.getContext('2d');if(!ctx)return;const dpr=window.devicePixelRatio||1;const w=c.parentElement.clientWidth-20,h=300;c.width=w*dpr;c.height=h*dpr;c.style.width=w+'px';c.style.height=h+'px';ctx.scale(dpr,dpr);const data={labels:["Enterprise","Mid-Market","SMB"],datasets:[{"label":"Count","data":[45,120,340],"color":"#d4a853"}]};const cx=w/2,cy=h/2-10,r=Math.min(w,h)/2-55,ir=r*0.55;const ds=data.datasets[0];const total=ds.data.reduce(function(a,v){return a+v},0);if(total===0)return;const colors=['#d4a853','#f0c969','#d4a853','#e0556a','#5bb87a'];let angle=-Math.PI/2;ds.data.forEach(function(v,i){var slice=v/total*Math.PI*2;var color=ds.color||colors[i%colors.length];ctx.fillStyle=color;ctx.beginPath();ctx.arc(cx,cy,r,angle,angle+slice);ctx.arc(cx,cy,ir,angle+slice,angle,true);ctx.closePath();ctx.fill();var mid=angle+slice/2;var pct=Math.round(v/total*100);if(pct>5){var lx=cx+Math.cos(mid)*(r+ir)/2,ly=cy+Math.sin(mid)*(r+ir)/2;ctx.fillStyle='#ffffff';ctx.font='600 12px Inter,sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(pct+'%',lx,ly)}angle+=slice});var lx=20,ly=h-20;ds.data.forEach(function(v,i){var color=ds.color||colors[i%colors.length];var pct=Math.round(v/total*100);ctx.fillStyle=color;ctx.fillRect(lx,ly-8,10,10);ctx.fillStyle='#eeebe5';ctx.font='600 10px Inter,sans-serif';ctx.textAlign='left';ctx.fillText(data.labels[i]+' '+pct+'%',lx+14,ly);lx+=ctx.measureText(data.labels[i]+' '+pct+'%').width+28})})()</script></div>
